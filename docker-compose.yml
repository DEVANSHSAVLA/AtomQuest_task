version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=super_secret_jwt_key_that_is_at_least_32_chars
      - PORT=5000
    volumes:
      - ./backend/prisma:/usr/src/app/prisma

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
